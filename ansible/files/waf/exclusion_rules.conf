# ============================================================================
# Règles d'exclusion ModSecurity — Tuning des faux positifs
# Déployé par Ansible (waf-setup.yml → Include dans setup.conf)
# ============================================================================
#
# Contexte : Le WAF OWASP CRS bloque certaines requêtes légitimes de
# l'application Juice Shop. Ces exclusions ajustent les règles CRS pour
# autoriser le trafic légitime sans désactiver la protection générale.
#
# Format : SecRuleUpdateTargetById permet de retirer une cible (ARG, URI, etc.)
# d'une règle CRS existante, au moment du chargement de la configuration.
# C'est l'approche recommandée (vs ctl:ruleRemoveTargetById) car elle
# fonctionne quelque soit l'ordre d'inclusion des fichiers.
# ============================================================================

# --------------------------------------------------------------------------
# FP-001 : Recherche de produits contenant "../"
# --------------------------------------------------------------------------
# Règle CRS :  930110 (Path Traversal Attack)
# Requête :    GET /rest/products/search?q=../juice
# Raison :     Le paramètre "q" de la recherche produit peut légitimement
#              contenir "../" (nom de produit, description). La règle 930110
#              détecte ce pattern comme une tentative LFI.
# Correction : On retire ARGS:q des cibles de la règle 930110.
#              La protection LFI reste active sur tous les autres paramètres
#              et endpoints (ex: /.git/config → toujours 403).
# --------------------------------------------------------------------------
SecRuleUpdateTargetById 930110 "!ARGS:q"

# --------------------------------------------------------------------------
# Résultat attendu après déploiement :
#   $ curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/rest/products/search?q=../juice"
#   → 200 (corrigé)
#   $ curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/.git/config"
#   → 403 (toujours protégé)
#   $ curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/rest/products/search?q=test%27%20OR%20%271%27=%271"
#   → 403 (toujours protégé)
# --------------------------------------------------------------------------
