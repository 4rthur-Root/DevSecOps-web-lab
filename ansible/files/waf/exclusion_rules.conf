# Règles d'exception WAF — DevSecOps Lab
# Faux positifs identifiés et documentés dans docs/ISSUES.md


# Règle 1001 — Socket.IO (Juice Shop temps réel)
# Raison : paramètres EIO/transport/sid déclenchent règles CRS
# Identifié via : Grafana {job="waf"} |= "403" le 2026-06-18
SecRule REQUEST_URI "@beginsWith /socket.io/" \
    "id:1001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=DetectionOnly,\
    msg:'Exclusion socket.io - trafic legitime Juice Shop'"
