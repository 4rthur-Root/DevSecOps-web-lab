- name: "PHASE 1 | WAF - Configuration Nginx + ModSecurity + Promtail"
  import_playbook: waf-setup.yml

- name: "PHASE 2 | Database - Hardening MySQL"
  import_playbook: db-hardening.yml

- name: "PHASE 3 | Monitoring - Vérification pipeline Promtail → Loki"
  import_playbook: monitoring.yml
